<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Created | MediHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #ecfeff, #f8fafc);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .box {
            background: #fff;
            padding: 30px;
            width: 380px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            color: #16a34a;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            padding: 10px 18px;
            background: #2563eb;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            background: #1e40af;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🎉 Account Created Successfully</h2>
    <p>
        A welcome email has been sent to<br>
        <strong>{{ email }}</strong>
    </p>

    <a href="{{ url_for('login') }}">Go to Login</a>
</div>

</body>
</html>
