<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Successful | MediHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: url("{{ url_for('static', filename='images/resetsuccessfull.png') }}") no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            width: 420px;
            padding: 40px;
            border-radius: 22px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.18);
            text-align: center;
        }

        .icon {
            font-size: 56px;
            color: #16a34a;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 24px;
        }

        a {
            display: inline-block;
            padding: 12px 22px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
        }

        a:hover {
            opacity: 0.95;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="icon">✅</div>

    <h1>Password Reset Successful</h1>

    <p>
        Your password has been updated successfully.  
        You can now log in securely to MediHub.
    </p>

    <a href="{{ url_for('login') }}">Go to Login</a>
</div>

</body>
</html>
