<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediHub | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;

            /* 🔥 FULL SCREEN BACKGROUND IMAGE */
            background: url("{{ url_for('static', filename='images/login-illustration.png') }}")
                        no-repeat center center fixed;
            background-size: cover;

            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        /* ===== LOGIN CARD ===== */
        .login-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);

            width: 380px;
            padding: 36px;
            border-radius: 18px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.18);

            margin-right: 80px;
            text-align: center;
        }

        .brand {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .brand span {
            color: #2563eb;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 26px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1.5px solid #c7d2fe;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        .password-box {
            position: relative;
        }

        .password-box span {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #555;
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .links {
            margin-top: 18px;
            font-size: 14px;
        }

        .links a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        /* ===== MOBILE VIEW ===== */
        @media (max-width: 900px) {
            body {
                justify-content: center;
                padding: 20px;
            }

            .login-card {
                margin-right: 0;
                width: 100%;
                max-width: 420px;
            }
        }
    </style>

    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>
</head>

<body>

    <!-- LOGIN CARD -->
    <div class="login-card">

        <div class="brand">Medi<span>Hub</span></div>
        <div class="subtitle">
            Secure ML&AI-powered medical report access
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email address"
                required
            >

            <div class="password-box">
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Password"
                    required
                >
                <span onclick="togglePassword()">👁</span>
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="links">
            <p>
                <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
            </p>
            <p>
                Don’t have an account?
                <a href="{{ url_for('register') }}">Create one</a>
            </p>
        </div>

    </div>

</body>
</html>
