<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediHub | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ecfeff, #f8fafc);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .auth-box {
            background: #fff;
            padding: 30px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 8px;
        }

        p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .password-box {
            position: relative;
        }

        .password-box span {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 14px;
            color: #555;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .links {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .links a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>

    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>
</head>

<body>

<div class="auth-box">
    <h2>Welcome Back</h2>
    <p>Login to access your medical dashboard</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" novalidate>
        <input
            type="email"
            name="email"
            placeholder="Email address"
            required
        >

        <div class="password-box">
            <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
            >
            <span onclick="togglePassword()">👁</span>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="links">
        <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
        <a href="{{ url_for('register') }}">Create account</a>
    </div>
</div>

</body>
</html>
