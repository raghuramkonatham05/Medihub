<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Reports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <style>
        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .reports-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            font-weight: 600;
            text-decoration: none;
            color: #2563eb;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 28px;
        }

        .report-card {
            background: #ffffff;
            padding: 22px;
            border-radius: 14px;
            margin-bottom: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .report-info a {
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            color: #1d4ed8;
        }

        .report-info p {
            margin-top: 6px;
            color: #6b7280;
            font-size: 14px;
        }

        .report-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            color: #fff;
            white-space: nowrap;
        }

        .btn-view { background: #2563eb; }
        .btn-download { background: #16a34a; }
        .btn-delete { background: #dc2626; }

        .btn-delete:hover,
        .btn-view:hover,
        .btn-download:hover {
            opacity: 0.9;
        }

        .empty {
            color: #6b7280;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="reports-container">

    <!-- BACK -->
    <a href="{{ url_for('analyze') }}" class="back-link">⬅ Back to Dashboard</a>


    <h1>Your Uploaded Reports</h1>

    <!-- ✅ SAFE EMPTY CHECK (NO .count()) -->
    {% if reports | length == 0 %}
        <p class="empty">No reports uploaded yet.</p>
    {% endif %}

    {% for r in reports %}
        <div class="report-card">

            <!-- INFO -->
            <div class="report-info">
                <a href="{{ url_for('view_report', report_id=r._id) }}">
                    {{ r.patient.name or "Patient" }}
                </a>
                <p>{{ r.created_at.strftime("%d %b %Y") }}</p>
            </div>

            <!-- ACTIONS -->
            <div class="report-actions">
    <a href="{{ url_for('view_report', report_id=r._id) }}"
       class="btn btn-view">View</a>

    <a href="{{ url_for('download_report', report_id=r._id) }}"
       class="btn btn-download">Download</a>

    <form method="POST"
          action="{{ url_for('delete_report', report_id=r._id) }}"
          onsubmit="return confirm('Delete this report permanently?');">
        <button type="submit" class="btn btn-delete">Delete</button>
    </form>
</div>


        </div>
    {% endfor %}

</div>

</body>
</html>
