<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediHub | Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: url("{{ url_for('static', filename='images/resetpass.png') }}")
                        no-repeat center center fixed;
            background-size: cover;

            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            width: 400px;
            padding: 36px;
            border-radius: 18px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.18);
            margin-right: 80px;
            text-align: center;
        }

        .brand {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .brand span {
            color: #2563eb;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1.5px solid #c7d2fe;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .rules {
            text-align: left;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 12px;
        }

        @media (max-width: 900px) {
            body {
                justify-content: center;
                padding: 20px;
            }
            .card {
                margin-right: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="brand">Medi<span>Hub</span></div>
    <div class="subtitle">
        Enter OTP and create a new password
    </div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="otp"
            placeholder="Enter OTP"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="New password"
            required
        >

        <div class="rules">
            Password must contain:
            <ul>
                <li>Minimum 8 characters</li>
                <li>1 uppercase letter</li>
                <li>1 special character</li>
            </ul>
        </div>

        <button type="submit">
            Reset Password
        </button>

    </form>

</div>

</body>
</html>
